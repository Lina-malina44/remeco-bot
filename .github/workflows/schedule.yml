name: Каталог по кодовому слову

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check messages and send if triggered
        env:
          SITE_LOGIN: ${{ secrets.SITE_LOGIN }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python check_and_run.py

      - name: Save last checked message
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_update_id.txt
          git diff --cached --quiet || git commit -m "update offset"
          git push
